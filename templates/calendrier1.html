<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Calendrier – Jardin d’Eden 133</title>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
</head>
<body>

<h1>Calendrier – Jardin d’Eden 133</h1>

<a href="/" style="
    display:inline-block;
    margin-bottom:20px;
    padding:10px 20px;
    background:#4d79ff;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
">← Retour à l’accueil</a>

<a href="https://www.airbnb.fr/rooms/1408690958278432453"
   target="_blank"
   style="
    display:inline-block;
    margin-bottom:20px;
    padding:10px 20px;
    background:#ff5a5f;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
">
    🏡 Voir l’annonce Airbnb
</a>

<div id="calendar"></div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', async function() {

    var calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {

        locale: 'fr',
        height: 200,

        views: {
            twoMonth: {
                type: 'dayGridMonth',
                duration: { months: 2 },
                buttonText: '2 mois'
            }
        },

        initialView: 'twoMonth',

        events: async function(fetchInfo, successCallback, failureCallback) {
            try {
                const response = await fetch('/import-airbnb-app1');
                const data = await response.json();

                const events = data.reservations.map(ev => ({
                    start: ev.start,
                    end: ev.end,
                    display: 'background',
                    backgroundColor: '#ff4d4d'
                }));

                successCallback(events);
            } catch (error) {
                failureCallback(error);
            }
        }
    });

    calendar.render();
});
</script>

</body>
</html>
